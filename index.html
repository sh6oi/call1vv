<!doctype html>
<html lang="ar" dir="rtl" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>محول الدولار إلى الدينار العراقي</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&amp;display=swap" rel="stylesheet">
  <style>
    body {
      box-sizing: border-box;
    }
    * {
      font-family: 'Tajawal', sans-serif;
    }
    .gradient-bg {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .input-glow:focus {
      box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
    }
    .result-glow {
      box-shadow: 0 0 40px rgba(233, 69, 96, 0.2);
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    @keyframes pulse-ring {
      0% { transform: scale(0.8); opacity: 0.5; }
      50% { transform: scale(1); opacity: 0.3; }
      100% { transform: scale(0.8); opacity: 0.5; }
    }
    .float-animation {
      animation: float 3s ease-in-out infinite;
    }
    .pulse-ring {
      animation: pulse-ring 2s ease-in-out infinite;
    }
    .number-display {
      font-variant-numeric: tabular-nums;
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full gradient-bg overflow-auto">
  <div class="min-h-full flex items-center justify-center p-6">
   <div class="w-full max-w-md"><!-- Decorative Elements -->
    <div class="absolute top-10 right-10 w-32 h-32 bg-pink-500 rounded-full opacity-10 blur-3xl pulse-ring"></div>
    <div class="absolute bottom-10 left-10 w-40 h-40 bg-blue-500 rounded-full opacity-10 blur-3xl pulse-ring" style="animation-delay: 1s;"></div><!-- Main Card -->
    <div class="glass-card rounded-3xl p-8 relative"><!-- Header -->
     <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-pink-500 to-rose-600 mb-4 float-animation">
       <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
       </svg>
      </div>
      <h1 id="main-title" class="text-2xl font-bold text-white mb-2">محول العملات</h1>
      <p id="subtitle" class="text-gray-400 text-sm">من الدولار الأمريكي إلى الدينار العراقي</p>
     </div><!-- Input Section -->
     <div class="mb-6"><label for="usd-input" class="block text-gray-300 text-sm font-medium mb-3"> <span class="flex items-center gap-2"> <span class="w-6 h-6 rounded-full bg-green-500/20 flex items-center justify-center text-green-400 text-xs font-bold">$</span> المبلغ بالدولار الأمريكي </span> </label>
      <div class="relative"><input type="number" id="usd-input" placeholder="0.00" class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white text-2xl font-bold text-center input-glow transition-all duration-300 focus:outline-none focus:border-pink-500/50 placeholder-gray-500" oninput="convertCurrency()"> <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 font-medium">USD</span>
      </div>
     </div><!-- Arrow Indicator -->
     <div class="flex justify-center my-4">
      <div class="w-12 h-12 rounded-full bg-gradient-to-br from-pink-500 to-rose-600 flex items-center justify-center">
       <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
       </svg>
      </div>
     </div><!-- Result Section -->
     <div class="result-glow rounded-2xl bg-gradient-to-br from-pink-500/10 to-rose-600/10 border border-pink-500/20 p-6">
      <div class="flex items-center justify-between mb-3"><span class="text-gray-400 text-sm flex items-center gap-2"> <span class="w-6 h-6 rounded-full bg-pink-500/20 flex items-center justify-center text-pink-400 text-xs font-bold">د.ع</span> المبلغ بالدينار العراقي </span>
      </div>
      <div id="iqd-result" class="text-4xl font-extrabold text-white number-display text-center">
       0
      </div>
      <div class="text-center mt-2"><span class="text-pink-400 text-sm">IQD</span>
      </div>
     </div><!-- Exchange Rate Info -->
     <div class="mt-6 p-4 rounded-xl bg-white/5 border border-white/10">
      <div class="flex items-center justify-between text-sm"><span class="text-gray-400">سعر الصرف الحالي</span> <span class="text-white font-bold">1 USD = 1,320 IQD</span>
      </div>
     </div><!-- Quick Amount Buttons -->
     <div class="mt-6">
      <p class="text-gray-400 text-xs mb-3 text-center">مبالغ سريعة</p>
      <div class="grid grid-cols-4 gap-2"><button onclick="setAmount(10)" class="py-2 px-3 rounded-xl bg-white/5 border border-white/10 text-white text-sm font-medium hover:bg-white/10 hover:border-pink-500/30 transition-all duration-200">$10</button> <button onclick="setAmount(50)" class="py-2 px-3 rounded-xl bg-white/5 border border-white/10 text-white text-sm font-medium hover:bg-white/10 hover:border-pink-500/30 transition-all duration-200">$50</button> <button onclick="setAmount(100)" class="py-2 px-3 rounded-xl bg-white/5 border border-white/10 text-white text-sm font-medium hover:bg-white/10 hover:border-pink-500/30 transition-all duration-200">$100</button> <button onclick="setAmount(500)" class="py-2 px-3 rounded-xl bg-white/5 border border-white/10 text-white text-sm font-medium hover:bg-white/10 hover:border-pink-500/30 transition-all duration-200">$500</button>
      </div>
     </div>
    </div><!-- Footer -->
    <p class="text-center text-gray-500 text-xs mt-6">💱 يتم التحويل تلقائياً أثناء الكتابة</p>
   </div>
  </div>
  <script>
    const EXCHANGE_RATE = 1320;

    const defaultConfig = {
      main_title: 'محول العملات',
      subtitle: 'من الدولار الأمريكي إلى الدينار العراقي',
      primary_color: '#e94560',
      background_color: '#1a1a2e',
      text_color: '#ffffff',
      secondary_surface: 'rgba(255, 255, 255, 0.05)',
      accent_color: '#0f3460'
    };

    let config = { ...defaultConfig };

    function convertCurrency() {
      const usdInput = document.getElementById('usd-input');
      const iqdResult = document.getElementById('iqd-result');
      
      const usdValue = parseFloat(usdInput.value) || 0;
      const iqdValue = usdValue * EXCHANGE_RATE;
      
      iqdResult.textContent = iqdValue.toLocaleString('ar-IQ');
      
      if (usdValue > 0) {
        iqdResult.classList.add('scale-105');
        setTimeout(() => iqdResult.classList.remove('scale-105'), 150);
      }
    }

    function setAmount(amount) {
      const usdInput = document.getElementById('usd-input');
      usdInput.value = amount;
      convertCurrency();
    }

    async function onConfigChange(newConfig) {
      config = { ...defaultConfig, ...newConfig };
      
      document.getElementById('main-title').textContent = config.main_title || defaultConfig.main_title;
      document.getElementById('subtitle').textContent = config.subtitle || defaultConfig.subtitle;
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (value) => {
              config.background_color = value;
              window.elementSdk.setConfig({ background_color: value });
            }
          },
          {
            get: () => config.secondary_surface || defaultConfig.secondary_surface,
            set: (value) => {
              config.secondary_surface = value;
              window.elementSdk.setConfig({ secondary_surface: value });
            }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => {
              config.text_color = value;
              window.elementSdk.setConfig({ text_color: value });
            }
          },
          {
            get: () => config.primary_color || defaultConfig.primary_color,
            set: (value) => {
              config.primary_color = value;
              window.elementSdk.setConfig({ primary_color: value });
            }
          },
          {
            get: () => config.accent_color || defaultConfig.accent_color,
            set: (value) => {
              config.accent_color = value;
              window.elementSdk.setConfig({ accent_color: value });
            }
          }
        ],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ['main_title', config.main_title || defaultConfig.main_title],
        ['subtitle', config.subtitle || defaultConfig.subtitle]
      ]);
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }
  </script>

</html>
