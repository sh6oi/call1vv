<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول الدولار إلى الدينار العراقي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .converter-card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .converter-card h2 {
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .converter-card p {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: right;
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #e0e6ed;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s ease;
            direction: ltr;
        }

        .input-group input:focus {
            border-color: #3498db;
        }

        .result-group {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border: 1px dashed #bdc3c7;
        }

        .result-group label {
            display: block;
            color: #34495e;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .result {
            font-size: 32px;
            font-weight: 700;
            color: #27ae60;
            direction: ltr;
        }
        
        .currency-symbol {
            font-size: 18px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <div class="converter-card">
        <h2>محول العملات الذكي</h2>
        <p>حساب السعر بالدينار العراقي مع نظام التقريب المخصص</p>

        <div class="input-group">
            <label>أدخل السعر بالدولار ($):</label>
            <input type="number" id="usdInput" placeholder="مثال: 100" min="0" oninput="convertCurrency()">
        </div>

        <div class="result-group">
            <label>السعر النهائي بالدينار العراقي:</label>
            <div class="result" id="iqdResult">0 <span class="currency-symbol">IQD</span></div>
        </div>
    </div>

    <script>
        function convertCurrency() {
            // جلب القيمة المدخلة بالدولار
            const usdInput = document.getElementById('usdInput').value;
            const resultElement = document.getElementById('iqdResult');

            // التحقق من أن الحقل ليس فارغاً
            if (!usdInput || usdInput < 0) {
                resultElement.innerHTML = '0 <span class="currency-symbol">IQD</span>';
                return;
            }

            // ضرب القيمة في 1320
            const rawIqd = usdInput * 1320;

            // فصل الرقم إلى آلاف وباقي (مثلاً 1600 تصبح: الأساس 1000 والباقي 600)
            const baseThousand = Math.floor(rawIqd / 1000) * 1000;
            const remainder = rawIqd % 1000;

            let finalIqd = 0;

            // تطبيق شروط التقريب التي طلبتها
            if (remainder < 500) {
                // إذا كان الباقي أقل من 500، تحذف ويتبقى الرقم الأساسي
                finalIqd = baseThousand;
            } else if (remainder >= 500 && remainder <= 750) {
                // إذا كان الباقي بين 500 و 750، يتحول إلى نصف (500)
                finalIqd = baseThousand + 500;
            } else {
                // إذا كان الباقي أكبر من 750، يقرب إلى الألف التالية
                finalIqd = baseThousand + 1000;
            }

            // عرض النتيجة مع إضافة الفوارز لتسهيل القراءة (مثل 1,500)
            resultElement.innerHTML = finalIqd.toLocaleString('en-US') + ' <span class="currency-symbol">IQD</span>';
        }
    </script>

</body>
</html>
